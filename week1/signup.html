<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>User Registration</title>
  </head>
  <body>
    <h1>User Registration</h1>

    <form>
      <fieldset>
        <legend>Personal Details</legend>
        <div class="form-group">
          <label for="first-name">First Name:</label>
          <input type="text" id="first-name" value="Justina" />
        </div>
        <div class="form-group">
          <label for="last-name">Last Name:</label>
          <input type="text" id="last-name" value="Dotson" />
        </div>
        <div class="form-group">
          <label for="age">Age:</label>
          <input type="number" id="age" value="41" />
        </div>
        <div class="form-group">
          <label for="gender">Gender:</label>
          <select id="gender">
            <option value="male" selected>Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label for="profile-picture">Profile Picture:</label>
          <input type="file" id="profile-picture" />
        </div>
      </fieldset>

      <fieldset>
        <legend>Account Details</legend>
        <div class="form-group">
          <label for="email">Email:</label>
          <input
            type="email"
            id="email"
            value="buzepi@mailinator.com"
            style="width: 200px"
          />
        </div>
        <div class="form-group">
          <label for="password">Password:</label>
          <input
            type="password"
            id="password"
            value="password123"
            style="width: 220px"
          />
        </div>
        <div class="form-group">
          <label>Role:</label>
          <input type="radio" id="role-admin" name="role" value="admin" />
          <label for="role-admin" style="font-weight: normal; font-size: 16px"
            >Admin</label
          >
          <input type="radio" id="role-user" name="role" value="user" checked />
          <label for="role-user" style="font-weight: normal; font-size: 16px"
            >User</label
          >
        </div>
      </fieldset>

      <div class="checkbox-group">
        <input type="checkbox" id="terms" checked />
        <label for="terms">I agree to the terms and conditions</label>
      </div>

      <div class="buttons">
        <button type="submit">Register</button>
        <button type="reset">Reset</button>
      </div>
    </form>

    <div class="footer">&copy; 2024 My Todo List. All rights reserved.</div>
  </body>
</html>
